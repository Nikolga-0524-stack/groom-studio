<!DOCTYPE html>
<html lang="ru">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добрыня Никитич - Груминг студия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 70px; }
        .header { background: #1B5E20; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 28px; }
        .header p { font-size: 16px; opacity: 0.9; margin-top: 5px; }
        .hero { padding: 30px 20px; text-align: center; background: #f9f9f9; }
        .hero img { font-size: 80px; }
        .hero h2 { color: #1B5E20; margin: 15px 0; }
        .buttons { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
        .btn { display: block; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: bold; }
        .btn-primary { background: #1B5E20; color: white; }
        .btn-primary:hover { background: #2E7D32; }
        .btn-accent { background: #FFD700; color: #1B5E20; }
        .btn-accent:hover { background: #FFE44D; }
        .bottom-menu { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; max-width: 480px; margin: 0 auto; }
        .bottom-menu a { text-align: center; text-decoration: none; color: #666; font-size: 12px; }
        .bottom-menu a.active { color: #1B5E20; font-weight: bold; }
        .bottom-menu a span { display: block; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Добрыня Никитич</h1>
            <p>Забота о вашем питомце с любовью</p>
        </div>
        <div class="hero">
            <div style="font-size: 80px;">🐕</div>
            <h2>Добро пожаловать!</h2>
            <p style="color: #555; margin: 10px 0;">Профессиональный груминг для ваших питомцев</p>
        </div>
        <div class="buttons">
            <a href="services.html" class="btn btn-primary"><i class="fas fa-scissors"></i> Услуги</a>
            <a href="booking.html" class="btn btn-accent"><i class="fas fa-calendar-check"></i> Записаться</a>
            <a href="chat.html" class="btn btn-primary" style="background: #4CAF50;"><i class="fas fa-comment"></i> Чат с нами</a>
        </div>
        <div class="bottom-menu">
            <a href="index.html" class="active"><i class="fas fa-home"></i> Домой</a>
            <a href="services.html"><i class="fas fa-scissors"></i> Услуги</a>
            <a href="booking.html"><i class="fas fa-calendar-check"></i> Запись</a>
            <a href="chat.html"><i class="fas fa-comment"></i> Чат</a>
        </div>
    </div>
</body>
</html>
