<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея - Добрыня Никитич</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 70px; }
        .header { background: #1B5E20; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .page-title { padding: 20px; text-align: center; font-size: 22px; color: #1B5E20; }

        /* Стили для галереи */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 20px 20px 20px;
        }
        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery-item:hover {
            transform: scale(1.03);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-item .tag {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(27, 94, 32, 0.8);
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            text-align: center;
        }

        /* Модальное окно (увеличение фото) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            object-fit: contain;
        }
        .modal .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Меню */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
            max-width: 480px;
            margin: 0 auto;
        }
        .bottom-menu a {
            text-align: center;
            text-decoration: none;
            color: #666;
            font-size: 12px;
        }
        .bottom-menu a.active {
            color: #1B5E20;
            font-weight: bold;
        }
        .bottom-menu a i {
            display: block;
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Добрыня Никитич</h1>
            <p>Забота о вашем питомце с любовью</p>
        </div>
        <div class="page-title">📸 Наши работы</div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Сюда будут подставляться фото из массива -->
        </div>

        <div class="bottom-menu">
            <a href="index.html"><i class="fas fa-home"></i>Домой</a>
            <a href="services.html"><i class="fas fa-scissors"></i>Услуги</a>
            <a href="booking.html"><i class="fas fa-calendar-check"></i>Запись</a>
            <a href="chat.html"><i class="fas fa-comment"></i>Чат</a>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <button class="close-btn" id="closeModal">&times;</button>
        <img id="modalImg" src="" alt="Увеличенное фото">
    </div>

    <script>
        // 📸 Список фотографий галереи
        // Добавляйте сюда свои фото: имя файла и подпись
        const galleryImages = [
            { src: "work1.jpg", tag: "Пудель" },
            { src: "work2.jpg", tag: "Лабрадор" },
            { src: "work3.jpg", tag: "Йоркшир" },
            { src: "work4.jpg", tag: "Спаниель" },
            { src: "work5.jpg", tag: "Шпиц" },
            { src: "work6.jpg", tag: "Мопс" }
        ];

        const grid = document.getElementById('galleryGrid');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const closeModal = document.getElementById('closeModal');

        // Заполняем галерею
        galleryImages.forEach(item => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `
                <img src="${item.src}" alt="${item.tag}" loading="lazy" onerror="this.style.display='none'">
                <div class="tag">${item.tag}</div>
            `;
            // Открытие увеличенного фото
            div.addEventListener('click', () => {
                modal.classList.add('active');
                modalImg.src = item.src;
            });
            grid.appendChild(div);
        });

        // Закрытие модального окна
        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
    </script>
